[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths — unit tests only by default.
# Integration tests (Supabase, network) live in IntegrationTests/ and
# must be invoked explicitly:
#   pytest IntegrationTests/ -m integration
#   SUPABASE_URL=... SUPABASE_KEY=... pytest IntegrationTests/ -v
testpaths = UnitTests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Markers for organizing tests
markers =
    unit: Unit tests (no external services required)
    integration: Integration tests (require Supabase credentials)
    slow: Tests that take longer to run
    fast: Quick tests that run fast

# Minimum Python version
minversion = 3.8
