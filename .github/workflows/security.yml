name: Security Scanning

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  schedule:
    - cron: '26 22 * * 2'  # Every Tuesday at 22:26 UTC

jobs:
  security_scanning:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest

    steps:
      # 🧾 Checkout repo
      - name: 🧾 Checkout repository
        uses: actions/checkout@v3

      # 🛡️ Bandit: Scan Codebase
      # This action automatically generates SARIF and allows us to ignore the UnitTests folder
      - name: 🛡️ Bandit Scan
        uses: shundor/bandit-sarif-action@v2
        with:
          project_path: .
          ignore_paths: 'UnitTests/bad_code.py'
          out_file: bandit-results.sarif

      # ☁️ Upload Bandit results to GitHub Security Tab
      - name: ☁️ Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      # 🔐 Safety: Dependency scan
      # Using the official PyUp Safety Action which handles SARIF conversion natively
      - name: 🔐 Safety - Dependency scan
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}