name: Security Scanning

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  schedule:
    - cron: '26 22 * * 2'

jobs:
  security_scanning:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Bandit & Safety
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 📁 Create output directory
        run: mkdir -p ./scan-results

      # 🛡️ Bandit: Now scanning the new modular directories explicitly
      - name: 🛡️ Bandit Scan
        run: |
          echo "Running Bandit on app/ and src/ directories..."
          bandit -r app/ src/ -f json -o scan-results/bandit-results.json || true
          # Also generate SARIF directly if possible, otherwise use your script
          bandit -r app/ src/ -f sarif -o scan-results/bandit-results.sarif || true

      - name: 🚨 Evaluate Bandit Results
        run: |
          echo "Evaluating security findings..."
          if [ -f scan-results/bandit-results.json ]; then
            # We filter for 'High' severity issues to avoid blocking on minor 'assert' warnings
            HIGH_VULNS=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' scan-results/bandit-results.json)
            if [ "$HIGH_VULNS" -gt 0 ]; then
              echo "❌ $HIGH_VULNS High-severity security issues found!"
              # To see the exact error in the logs:
              jq '.results[] | select(.issue_severity == "HIGH")' scan-results/bandit-results.json
              exit 1
            else
              echo "✅ No high-severity issues found."
            fi
          else
            echo "✅ No scan results found to evaluate."
          fi

      - name: 🔐 Safety - Dependency scan
        run: |
          echo "Running Safety scan on requirements.txt..."
          safety check -r requirements.txt --json > ./scan-results/safety_output.json || true
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

      # Uploading results to the GitHub Security Tab
      - name: ☁️ Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-results/bandit-results.sarif
          category: bandit

      # 📄 Convert and Upload Safety (if vulnerabilities exist)
      - name: 🔁 Convert Safety results
        if: success() || failure()
        run: |
          if [ -f ./scan-results/safety_output.json ]; then
            python scripts/convert_safety_to_sarif.py ./scan-results/safety_output.json ./scan-results/safety_output.sarif requirements.txt || echo "Conversion failed"
          fi

      - name: ☁️ Upload Safety SARIF
        if: hashFiles('scan-results/safety_output.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./scan-results/safety_output.sarif
          category: safety